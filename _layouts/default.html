<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ page.title | default: site.title }}</title>
  <meta property="og:title" content="Gracie Zeller"/>
  <meta property="og:description" content="Laboratory manager at UW-Madison"/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="graciezeller.github.io"/>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #faf8f4;
  --text: #2d2418;
  --muted: #6b6256;
  --border: #d9cfc0;
  --border-light: #e8e0d4;
}

body.dark {
  --bg: #0f0f0f;
  --text: #f0ece4;
  --muted: #bfb6aa;
  --border: #3a3530;
  --border-light: #2a2520;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  line-height: 1.8;
  transition: background 0.3s ease, color 0.3s ease;
}

.container {
  max-width: 85ch;
  margin: 0 auto;
  padding: 0 2rem;
}

nav {
  padding: 3rem 0 0;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  opacity: 0;
  animation: fadeIn 0.5s ease forwards 0.05s;
}

.nav-name { font-weight: 700; font-size: 1.25rem; }

.nav-links {
  display: flex;
  gap: 2rem;
  list-style: none;
  align-items: baseline;
}

.nav-links a {
  color: var(--muted);
  font-size: 1.1rem;
}

.nav-links a:hover { color: var(--text); }

#theme-toggle {
  background: none;
  border: none;
  font-size: 1rem;
  cursor: pointer;
  padding: 0;
  line-height: 1;
  transition: opacity 0.15s, filter 0.15s;
}

#theme-toggle:hover { opacity: 0.6; }

body.dark #theme-toggle {
  filter: invert(1) brightness(0.8);
}

.hero {
  padding: 4rem 0 3rem;
  opacity: 0;
  animation: fadeIn 0.5s ease forwards 0.15s;
}

.hero p { color: var(--muted); margin-bottom: 0.3rem; }
.hero p strong { color: var(--text); font-weight: 700; }

a {
  color: var(--muted);
  text-decoration: none;
  border-bottom: 1px solid var(--border);
  transition: border-color 0.15s, color 0.15s;
}

a:hover {
  color: var(--text);
  border-color: var(--text);
}

.divider { height: 1px; background: var(--border); }

section {
  padding: 2.5rem 0;
  opacity: 0;
  animation: fadeIn 0.5s ease forwards;
}

section:nth-of-type(1) { animation-delay: 0.25s; }
section:nth-of-type(2) { animation-delay: 0.32s; }
section:nth-of-type(3) { animation-delay: 0.39s; }
section:nth-of-type(4) { animation-delay: 0.46s; }

.section-label {
  color: var(--muted);
  font-style: italic;
  margin-bottom: 1.4rem;
  font-size: 1.1rem;
}

.work-item {
  display: grid;
  grid-template-columns: 1fr auto;
  column-gap: 2rem;
  padding: 0.7rem 0;
  text-decoration: none;
  color: inherit;
}

.work-item:first-child { border-top: 1px solid var(--border-light); }

.work-header {
  display: contents;
  cursor: pointer;
}

.work-header:hover .work-title { color: var(--muted); }

.work-header .work-title::after {
  content: ' +';
  color: var(--muted);
  font-weight: 400;
}

.work-item.open .work-title::after { content: ' −'; }

.work-abstract {
  display: none;
  color: var(--muted);
  font-size: 0.9rem;
  grid-column: 1 / -1;
  padding: 0.4rem 0 0.4rem;
  border-top: 1px solid var(--border-light);
  margin-top: 0.3rem;
}

.work-abstract.open { display: block; }

.work-desc {
  display: block;
  color: var(--muted);
  font-size: 0.9rem;
  grid-column: 1 / -1;
  padding-bottom: 0.4rem;
}

.work-year { color: var(--muted); white-space: nowrap; font-style: italic; }

.cv-link { color: var(--text); }

.contact-links {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

.hero a,
.contact-links a {
  color: var(--muted);
}

.hero a:hover,
.contact-links a:hover {
  color: var(--text);
}

footer { padding: 2rem 0 3rem; color: #b0a898; font-size: 0.75rem; }

@keyframes fadeIn { to { opacity: 1; } }

@media (max-width: 480px) {
  nav { flex-direction: column; gap: 0.8rem; }
  .hero-inner { flex-direction: column-reverse; }
  .hero-inner img { width: 80px; height: 80px; }
}

/* CV styles */
.cv-wrap {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.cv-section {
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.cv-section:hover { border-color: var(--text); }

.cv-section-toggle {
  width: 100%;
  background: none;
  border: none;
  text-align: left;
  padding: 14px 20px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: inherit;
}

.cv-section-label {
  font-size: 0.95rem;
  color: var(--text);
}

.cv-section-toggle:hover .cv-section-label { color: var(--muted); }

.cv-chevron {
  width: 16px;
  height: 16px;
  stroke: var(--muted);
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: transform 0.2s;
  flex-shrink: 0;
}

.cv-chevron.open { transform: rotate(180deg); }

.cv-section-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.3s ease;
}

.cv-section-body.open { max-height: 1000px; }

.cv-section-inner { padding: 1.25rem 20px; }
    
.cv-entry {
  display: flex;
  gap: 1rem;
  margin-bottom: 1rem;
}

.cv-entry:last-child { margin-bottom: 0; }

.cv-entry-date {
  font-size: 0.85rem;
  color: var(--muted);
  min-width: 80px;
  padding-top: 2px;
}

.cv-entry-content { flex: 1; }

.cv-entry-title {
  font-size: 0.9rem;
  color: var(--text);
  margin: 0 0 2px;
}

.cv-entry-place {
  font-size: 0.85rem;
  color: var(--muted);
  margin: 0 0 4px;
}

.cv-entry-desc {
  font-size: 0.85rem;
  color: var(--muted);
  margin: 0;
  line-height: 1.6;
}

.cv-pub-item { margin-bottom: 0.75rem; }
.cv-pub-item:last-child { margin-bottom: 0; }

.cv-pub-title {
  font-size: 0.9rem;
  color: var(--text);
  margin: 0 0 2px;
}

.cv-pub-meta {
  font-size: 0.85rem;
  color: var(--muted);
  margin: 0;
}

.cv-pub-meta a { color: var(--text); }

.cv-download-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  width: fit-content;
  margin-top: 1.5rem;
  padding: 0;
  font-family: inherit;
  font-size: 0.9rem;
  line-height: 1;
  color: var(--muted);
  background: none;
  border: none;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}

.cv-download-btn:hover {
  color: var(--text);
  border-color: var(--text);
}

.cv-download-btn svg {
  width: 13px;
  height: 13px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}
    
  </style>
</head>
<body>
<div class="container">

  <nav>
    <span class="nav-name">Gracie Zeller</span>
    <ul class="nav-links">
      <li><a href="#cv">cv</a></li>
      <li><a href="#work">projects</a></li>
      <li><a href="#contact">contact</a></li>
      <li><button id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">☾</button></li>
    </ul>
  </nav>

  {{ content }}

  <footer>© 2026 Gracie Zeller</footer>

</div>
<script>
  function toggleAbstract(item) {
    item.classList.toggle('open');
    item.querySelector('.work-abstract').classList.toggle('open');
  }

  function toggleTheme() {
    const isDark = document.body.classList.toggle('dark');
    document.getElementById('theme-toggle').textContent = isDark ? '𖤓' : '☾';
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  }

  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark');
    document.getElementById('theme-toggle').textContent = '𖤓';
  }
</script>
</body>
</html>
